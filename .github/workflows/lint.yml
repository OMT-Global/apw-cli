name: Rust checks

on:
  pull_request:

jobs:
  lint:
    # Rust build scripts need a C linker; run inside the Rust container on the
    # Docker-capable self-hosted Linux pool instead of the minimal shell-only host.
    runs-on:
      - self-hosted
      - linux
      - docker-capable
      - public
    container: rust:1-bookworm

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Verify version sync
        run: |
          chmod +x ./.github/scripts/verify-version-sync.sh
          ./.github/scripts/verify-version-sync.sh \
            rust/Cargo.toml \
            rust/src/cli.rs \
            rust/src/types.rs \
            packaging/homebrew/apw.rb \
            README.md \
            docs/INSTALLATION.md \
            docs/MIGRATION_AND_PARITY.md

      - name: Rust format check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Rust lint
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Rust security regression tests
        run: cargo test --manifest-path rust/Cargo.toml --test security_regressions

      - name: Rust build
        run: cargo build --manifest-path rust/Cargo.toml --release
