name: Rust checks

on:
  pull_request:

jobs:
  lint:
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux build tools
        run: |
          if command -v cc >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y build-essential pkg-config libssl-dev
            exit 0
          fi
          echo "No C compiler found and no supported package manager is available." >&2
          exit 1
      
      - name: Verify version sync
        run: |
          chmod +x ./.github/scripts/verify-version-sync.sh
          ./.github/scripts/verify-version-sync.sh \
            rust/Cargo.toml \
            rust/src/cli.rs \
            rust/src/types.rs \
            packaging/homebrew/apw.rb \
            README.md \
            docs/INSTALLATION.md \
            docs/MIGRATION_AND_PARITY.md

      - name: Rust format check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Rust lint
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Rust legacy parity tests
        run: cargo test --manifest-path rust/Cargo.toml --test legacy_parity

      - name: Rust security regression tests
        run: cargo test --manifest-path rust/Cargo.toml --test security_regressions

      - name: Rust build
        run: cargo build --manifest-path rust/Cargo.toml --release
