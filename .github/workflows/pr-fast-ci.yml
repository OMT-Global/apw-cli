name: PR Fast CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-fast-hosted-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
      native_app: ${{ steps.filter.outputs.native_app }}
      rust_native_e2e: ${{ steps.filter.outputs.rust_native_e2e }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'rust/**'
              - 'native-app/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'project.bootstrap.yaml'
              - 'scripts/**'
              - 'README.md'
              - 'docs/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/**'
              - '.env.example'
              - 'CODEOWNERS'
            native_app:
              - 'native-app/**'
              - 'scripts/build-native-app.sh'
            rust_native_e2e:
              # Security-sensitive Rust paths that exercise diagnostics, local
              # state resolution, or the native broker boundary.
              - 'rust/src/bundle.rs'
              - 'rust/src/main.rs'
              - 'rust/src/native_app.rs'
              - 'rust/src/state_root.rs'
              - 'rust/src/utils.rs'
              - 'rust/tests/native_app_e2e.rs'

  fast-checks:
    name: Fast Checks
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    timeout-minutes: 15
    needs: changes
    if: >-
      github.event.pull_request.draft == false &&
      (
        needs.changes.outputs.app == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        needs.changes.outputs.native_app == 'true'
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run fast checks
        run: bash scripts/ci/run-fast-checks.sh

  native-app-swift-tests:
    name: Native App Swift Tests
    # Hosted fallback: the self-hosted macOS/Xcode slots are currently offline,
    # and this PR needs the native app compile gate to complete before merge.
    runs-on: macos-latest
    timeout-minutes: 20
    needs: changes
    if: >-
      github.event.pull_request.draft == false &&
      needs.changes.outputs.native_app == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run native app xcodebuild tests
        working-directory: native-app
        run: >-
          xcodebuild
          -scheme APW-Package
          -destination 'platform=macOS'
          -derivedDataPath .xcode-derived
          test

  rust-native-e2e:
    name: Rust Native App E2E
    # Use an isolated hosted runner for PR code. The private macOS pool is
    # capacity-constrained and must not become a reliability or trust-boundary
    # dependency for this required gate.
    runs-on: macos-latest
    timeout-minutes: 30
    needs: changes
    if: >-
      github.event.pull_request.draft == false &&
      needs.changes.outputs.rust_native_e2e == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust native app end-to-end tests
        run: cargo test --manifest-path rust/Cargo.toml --test native_app_e2e

  validate-secrets:
    name: Validate Secrets
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Scan repository for secret patterns
        run: bash scripts/check-detect-secrets.sh --all-files

  ci-gate:
    name: CI Gate
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    if: always()
    needs:
      - changes
      - fast-checks
      - native-app-swift-tests
      - rust-native-e2e
      - validate-secrets
    steps:
      - name: Check required PR jobs
        env:
          RESULTS: >-
            changes=${{ needs.changes.result }}
            fast-checks=${{ needs.fast-checks.result }}
            native-app-swift-tests=${{ needs.native-app-swift-tests.result }}
            rust-native-e2e=${{ needs.rust-native-e2e.result }}
            validate-secrets=${{ needs.validate-secrets.result }}
        run: |
          failed=0
          for entry in $RESULTS; do
            job="${entry%%=*}"
            status="${entry##*=}"
            if [[ "$status" == "success" || "$status" == "skipped" ]]; then
              echo "OK   $job => $status"
            else
              echo "FAIL $job => $status"
              failed=1
            fi
          done
          exit "$failed"
