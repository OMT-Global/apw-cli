name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ['self-hosted', 'private', 'macOS', 'ARM64', 'xcode']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version sync
        run: |
          chmod +x ./.github/scripts/verify-version-sync.sh
          ./.github/scripts/verify-version-sync.sh \
            rust/Cargo.toml \
            rust/src/cli.rs \
            rust/src/types.rs \
            packaging/homebrew/apw.rb \
            README.md \
            docs/INSTALLATION.md \
            docs/MIGRATION_AND_PARITY.md

      - name: Verify archive policy documentation is present
        run: |
          rg -n "Legacy archive policy|legacy/deno/.*read-only|First-run policy" docs/ARCHIVE_POLICY.md

      - name: Run verification
        run: |
          cargo fmt --manifest-path rust/Cargo.toml -- --check
          cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path rust/Cargo.toml
          cargo test --manifest-path rust/Cargo.toml --test legacy_parity
          cargo test --manifest-path rust/Cargo.toml --test security_regressions

      - name: Build release binary
        run: cargo build --manifest-path rust/Cargo.toml --release

      - name: Build local source tarball for Homebrew smoke
        id: source_tarball
        run: |
          archive="/tmp/apw-${GITHUB_REF_NAME}.tar.gz"
          git archive --format=tar.gz -o "$archive" HEAD
          echo "path=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$archive" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Validate source tarball includes Rust manifest
        run: |
          archive="${{ steps.source_tarball.outputs.path }}"
          normalized_paths="$(tar -tzf "$archive" | sed -E 's#^./##')"
          missing=0
          required=(
            "rust/Cargo.toml"
            "rust/src/main.rs"
            "rust/src/cli.rs"
          )
          for path in "${required[@]}"; do
            if ! echo "$normalized_paths" | grep -qE "(^|/)$(printf '%s' "$path" | sed 's#/#\\\\/#g')$"; then
              echo "Missing required path in release tarball: $path"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Release tarball is missing required Rust source files. Aborting release."
            echo "Hint: ensure the Rust migration is present in the commit being released."
            exit 1
          fi

      - name: Resolve release version
        id: release_version
        run: |
          version="$(grep '^version = ' rust/Cargo.toml | head -n 1 | sed -E 's/^version = \"([^\"]+)\"/\\1/')"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate release tag vs manifest version
        run: |
          expected_tag="v${{ steps.release_version.outputs.value }}"
          if [ "${{ github.ref_name }}" != "$expected_tag" ]; then
            echo "Release tag mismatch: expected ${expected_tag}, got ${{ github.ref_name }}"
            exit 1
          fi

      - name: Verify binary and status JSON
        run: |
          ./rust/target/release/apw --version
          ./rust/target/release/apw status --json

      - name: Build native app bundle
        run: ./scripts/build-native-app.sh

      - name: Homebrew smoke install from source tarball
        env:
          APW_SRC_TARBALL: ${{ steps.source_tarball.outputs.path }}
          APW_SRC_SHA256: ${{ steps.source_tarball.outputs.sha256 }}
        run: |
          tap_path="$(brew --repository)/Library/Taps/local/homebrew-apw-smoke"
          mkdir -p "$tap_path/Formula"
          cat > /tmp/apw-homebrew-smoke.rb <<EOF
          class Apw < Formula
            desc "Apple Password CLI and daemon (macOS-first)"
            homepage "${{ github.server_url }}/${{ github.repository }}"
            url "file://$APW_SRC_TARBALL"
            sha256 "$APW_SRC_SHA256"
            version "${{ steps.release_version.outputs.value }}"
            license "GPL-3.0-only"
            depends_on "rust" => :build

            on_macos do
            end

            def install
              system "cargo", "build", "--manifest-path", "rust/Cargo.toml", "--release"
              bin.install "rust/target/release/apw"
            end

            test do
              assert_match(/^apw/, shell_output("#{bin}/apw --version"))
            end
          end
          EOF
          cp /tmp/apw-homebrew-smoke.rb "$tap_path/Formula/apw.rb"
          brew install --build-from-source local/apw-smoke/apw
          apw --version
          apw status --json
          brew uninstall --ignore-dependencies local/apw-smoke/apw || true
          rm -rf "$tap_path"

      - name: Package release archive
        run: |
          mkdir -p dist
          rm -rf dist/apw dist/APW.app
          cp rust/target/release/apw dist/apw
          cp -R native-app/dist/APW.app dist/APW.app
          tar -czf dist/apw-macos-${GITHUB_REF_NAME}.tar.gz -C dist apw APW.app

      - name: Release artifact smoke
        run: |
          archive="dist/apw-macos-${GITHUB_REF_NAME}.tar.gz"
          smoke_dir="$(mktemp -d)"
          smoke_home="$(mktemp -d)"
          trap 'rm -rf "$smoke_dir" "$smoke_home"' EXIT
          tar -xzf "$archive" -C "$smoke_dir"
          test -x "$smoke_dir/apw"
          test -x "$smoke_dir/APW.app/Contents/MacOS/APW"
          HOME="$smoke_home" "$smoke_dir/apw" --version
          HOME="$smoke_home" "$smoke_dir/apw" status --json
          HOME="$smoke_home" "$smoke_dir/apw" app install

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/apw-macos-${{ github.ref_name }}.tar.gz

  publish-homebrew-tap:
    name: Publish Homebrew tap PR
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'OMT-Global/homebrew-apw' }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check Homebrew tap token
        id: tap_token
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::HOMEBREW_TAP_TOKEN is not configured; skipping tap PR creation."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source repo
        if: steps.tap_token.outputs.available == 'true'
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout Homebrew tap
        if: steps.tap_token.outputs.available == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ env.TAP_TOKEN }}
          path: tap

      - name: Download release source tarball and compute SHA-256
        if: steps.tap_token.outputs.available == 'true'
        id: homebrew_source
        working-directory: source
        run: |
          version="${GITHUB_REF_NAME#v}"
          tarball="$RUNNER_TEMP/apw-${GITHUB_REF_NAME}.tar.gz"
          url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl --fail --location --retry 3 --output "$tarball" "$url"
          sha256="$(sha256sum "$tarball" | awk '{print $1}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Render tap formula
        if: steps.tap_token.outputs.available == 'true'
        run: |
          mkdir -p tap/Formula
          source/scripts/render-homebrew-formula.sh \
            "${{ steps.homebrew_source.outputs.version }}" \
            "${{ steps.homebrew_source.outputs.sha256 }}" \
            source/packaging/homebrew/apw.rb.template \
            tap/Formula/apw.rb

      - name: Open draft PR in Homebrew tap
        if: steps.tap_token.outputs.available == 'true'
        working-directory: tap
        env:
          GH_TOKEN: ${{ env.TAP_TOKEN }}
          VERSION: ${{ steps.homebrew_source.outputs.version }}
          SHA256: ${{ steps.homebrew_source.outputs.sha256 }}
        run: |
          branch="release/apw-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add Formula/apw.rb
          if git diff --cached --quiet; then
            echo "Tap formula already up to date for v${VERSION}."
            exit 0
          fi
          git commit -m "Update apw formula to v${VERSION}"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --repo "$TAP_REPOSITORY" \
            --head "$branch" \
            --base main \
            --draft \
            --title "Update apw formula to v${VERSION}" \
            --body "Updates apw.rb for ${GITHUB_REPOSITORY}@${GITHUB_REF_NAME}.\n\nSHA-256: \\`${SHA256}\\`" \
            || gh pr edit "$branch" --repo "$TAP_REPOSITORY" --body "Updates apw.rb for ${GITHUB_REPOSITORY}@${GITHUB_REF_NAME}.\n\nSHA-256: \\`${SHA256}\\`"
