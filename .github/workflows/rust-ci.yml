name: Rust

on: push

permissions:
  contents: write

jobs:
  test:
    # Rust build scripts need a C linker; the public shell-only Linux pool is
    # intentionally minimal and cannot satisfy that compile-time dependency.
    runs-on: ['self-hosted', 'private', 'macOS', 'ARM64', 'xcode']

    steps:
      - name: Setup repo
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Rust lint
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Rust security regression tests
        run: cargo test --manifest-path rust/Cargo.toml --test security_regressions

      - name: Rust build
        run: cargo build --manifest-path rust/Cargo.toml --release
