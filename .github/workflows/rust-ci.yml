name: Rust

on: push

permissions:
  contents: write

jobs:
  test:
    # Hosted fallback: the self-hosted shell-only Linux pool does not provide a
    # C toolchain, and the Docker-capable pool currently has an incompatible
    # Docker client for Actions container jobs.
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Rust lint
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Rust security regression tests
        run: cargo test --manifest-path rust/Cargo.toml --test security_regressions

      - name: Rust build
        run: cargo build --manifest-path rust/Cargo.toml --release
